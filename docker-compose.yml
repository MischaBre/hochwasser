services:
  postgres:
    image: postgres:16
    container_name: hochwasser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hochwasser
      POSTGRES_USER: hochwasser
      POSTGRES_PASSWORD: hochwasser
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hochwasser -d hochwasser"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10
    container_name: hochwasser-flyway
    depends_on:
      postgres:
        condition: service_healthy
    command: ["migrate"]
    environment:
      FLYWAY_URL: "${FLYWAY_URL:-jdbc:postgresql://postgres:5432/hochwasser}"
      FLYWAY_USER: "${FLYWAY_USER:-hochwasser}"
      FLYWAY_PASSWORD: "${FLYWAY_PASSWORD:-hochwasser}"
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_CONNECT_RETRIES: "30"
    volumes:
      - ./sql/migrations:/flyway/sql:ro

  hochwasser-alert:
    build: .
    container_name: hochwasser-alert
    restart: unless-stopped
    ports:
      - "8090:8090"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8090/health', timeout=3)); sys.exit(0 if data.get('status') == 'ok' else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      PROVIDER: pegelonline
      DATABASE_URL: "${DATABASE_URL:-postgresql://hochwasser:hochwasser@postgres:5432/hochwasser}"
      FORECAST_SERIES_SHORTNAME: "WV"
      ALERT_RECIPIENTS: ${ALERT_RECIPIENTS}

      ALERT_DEDUPE_HOURS: "24"
      LOG_LEVEL: DEBUG
      TZ: ${TZ}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SENDER: ${SMTP_SENDER}
      SMTP_USE_STARTTLS: "${SMTP_USE_STARTTLS}"
      SMTP_USE_SSL: "${SMTP_USE_SSL}"

      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: "8090"
      HEALTH_FAILURE_THRESHOLD: "3"

  container-watchdog:
    build: .
    container_name: container-watchdog
    restart: unless-stopped
    depends_on:
      - hochwasser-alert
    working_dir: /app
    command: ["python", "/app/app/watchdog.py"]
    environment:
      LOG_LEVEL: INFO
      TZ: ${TZ}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SENDER: ${SMTP_SENDER}
      SMTP_USE_STARTTLS: "${SMTP_USE_STARTTLS}"
      SMTP_USE_SSL: "${SMTP_USE_SSL}"
      ALERT_RECIPIENTS: ${ALERT_RECIPIENTS}
      WATCHDOG_ALERT_RECIPIENTS: ${WATCHDOG_ALERT_RECIPIENTS}
      WATCHDOG_WATCH_CONTAINERS: "hochwasser-alert"
      WATCHDOG_COOLDOWN_SECONDS: "900"
      WATCHDOG_AUTO_RESTART_UNHEALTHY: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
