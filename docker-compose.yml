services:
  postgres:
    image: postgres:16
    container_name: hochwasser-postgres
    profiles:
      - dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: hochwasser
      POSTGRES_USER: hochwasser
      POSTGRES_PASSWORD: hochwasser
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hochwasser -d hochwasser"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10
    container_name: hochwasser-flyway
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    command: ["migrate"]
    environment:
      FLYWAY_URL: "${FLYWAY_URL:-jdbc:postgresql://postgres:5432/hochwasser}"
      FLYWAY_USER: "${FLYWAY_USER:-hochwasser}"
      FLYWAY_PASSWORD: "${FLYWAY_PASSWORD:-hochwasser}"
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_CONNECT_RETRIES: "30"
    volumes:
      - ./sql/migrations:/flyway/sql:ro

  hochwasser-alert:
    build: .
    container_name: hochwasser-alert
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "8090:8090"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8090/health', timeout=3)); sys.exit(0 if data.get('status') == 'ok' else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      PROVIDER: "${PROVIDER:-pegelonline}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://hochwasser:hochwasser@postgres:5432/hochwasser}"
      FORECAST_SERIES_SHORTNAME: "WV"

      ALERT_DEDUPE_HOURS: "24"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: ${TZ}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SENDER: ${SMTP_SENDER}
      SMTP_USE_STARTTLS: "${SMTP_USE_STARTTLS}"
      SMTP_USE_SSL: "${SMTP_USE_SSL}"

      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: "8090"
      HEALTH_FAILURE_THRESHOLD: "3"

  hochwasser-api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: hochwasser-api
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8080/health/live', timeout=3)); sys.exit(0 if data.get('status') == 'ok' else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      API_DATABASE_URL: "${API_DATABASE_URL:-postgresql://hochwasser:hochwasser@postgres:5432/hochwasser}"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
      SUPABASE_ISSUER: ${SUPABASE_ISSUER}
      SUPABASE_AUDIENCE: "${SUPABASE_AUDIENCE:-authenticated}"
      API_DEFAULT_ORG_ID: "${API_DEFAULT_ORG_ID:-11111111-1111-1111-1111-111111111111}"
      API_INITIAL_ADMIN_USER_ID: ${API_INITIAL_ADMIN_USER_ID}
      API_AUTO_PROVISION_MEMBERS: "${API_AUTO_PROVISION_MEMBERS:-true}"
      API_CORS_ALLOW_ORIGINS: ${API_CORS_ALLOW_ORIGINS}

  hochwasser-frontend:
    image: node:20-alpine
    container_name: hochwasser-frontend
    restart: unless-stopped
    profiles:
      - dev
    working_dir: /app/frontend
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    depends_on:
      hochwasser-api:
        condition: service_started
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8080}"
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules

  container-watchdog:
    build: .
    container_name: container-watchdog
    restart: unless-stopped
    profiles:
      - prod
    user: "0:0"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      - hochwasser-alert
    working_dir: /app
    command: ["python", "/app/app/watchdog.py"]
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: ${TZ}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SENDER: ${SMTP_SENDER}
      SMTP_USE_STARTTLS: "${SMTP_USE_STARTTLS}"
      SMTP_USE_SSL: "${SMTP_USE_SSL}"
      WATCHDOG_ALERT_RECIPIENTS: ${WATCHDOG_ALERT_RECIPIENTS}
      WATCHDOG_WATCH_CONTAINERS: "hochwasser-alert"
      WATCHDOG_COOLDOWN_SECONDS: "900"
      WATCHDOG_AUTO_RESTART_UNHEALTHY: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  frontend_node_modules:
